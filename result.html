<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نتيجة التوافق</title>

<style>
body {
    margin: 0;
    background: #0b1a2b; /* ازرق حبري */
    color: white;
    font-family: Arial;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #0f243d;
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

button {
    margin-top: 15px;
    background: #2ea3f2;
    border: none;
    padding: 10px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="container">
    <div class="card">
        <h2>📊 نتيجة التوافق</h2>
        <div id="result">جاري التحميل...</div>
        <button onclick="back()">رجوع</button>
    </div>
</div>

<script>

// قراءة البيانات من JSON
fetch('data.json')
.then(res => res.json())
.then(data => {

    const brand = localStorage.getItem('brand');
    const model = localStorage.getItem('model');

    const result = data[brand]?.[model];

    if(result){
        document.getElementById('result').innerHTML =
            `📱 الجهاز: ${model} <br><br> 🔁 البديل: ${result}`;
    } else {
        document.getElementById('result').innerHTML =
            '❌ لا يوجد توافق لهذا الجهاز';
    }

});

// زر الرجوع
function back(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
